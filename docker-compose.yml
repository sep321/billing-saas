version: '3.9'

services:
  # 1. PHP Application Container (Laravel & Vite & Node)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER: laravel
        UID: 1000
        GID: 1000
    container_name: isp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - isp-network

  # 2. Nginx Web Server Container
  nginx:
    image: nginx:alpine
    container_name: isp_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - isp-network

  # 3. PostgreSQL Database Container (Main App)
  postgres:
    image: postgres:15-alpine
    container_name: isp_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-isp_billing}"
      POSTGRES_USER: "${DB_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-isp_billing}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isp-network

  # 4. MySQL Container (Only for FreeRADIUS)
  mysql:
    image: mysql:8.0
    container_name: isp_mysql_radius
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: "${MYSQL_RADIUS_DATABASE:-radius}"
      MYSQL_USER: "${MYSQL_RADIUS_USERNAME:-radius}"
      MYSQL_PASSWORD: "${MYSQL_RADIUS_PASSWORD:-radius123}"
      MYSQL_ROOT_PASSWORD: "root"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isp-network

  # 5. Redis Container (Cache, Sessions, Queues)
  redis:
    image: redis:alpine
    container_name: isp_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isp-network

  # 6. FreeRADIUS Container
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: isp_freeradius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - radius_config:/etc/raddb
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - isp-network

networks:
  isp-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local
  radius_config:
    driver: local
